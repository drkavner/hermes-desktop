name: Download AI Images

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/nice-dirac-O9Sfw

      - name: Download all 79 images
        run: |
          cd youtube-images
          bash download_ai_images.sh

      - name: Commit and push images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add youtube-images/ai-images/
          git commit -m "Add 79 AI-generated images with timestamp filenames"
          git push
